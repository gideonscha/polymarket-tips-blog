name: Smoke Test - Polymarket APIs

# Throwaway, manual-only feasibility probe. Never runs on a schedule.
# Confirms the 5 public endpoints return live data matching the documented
# schemas. Uses a public leaderboard wallet fetched at runtime — no personal
# address, nothing hardcoded.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Probe Polymarket public endpoints
        run: |
          node --input-type=module <<'EOF'
          const LEADERBOARD = 'https://kfiizygdnlgffjdyzfxj.supabase.co/functions/v1/public-leaderboard';

          function head(label, status, ct) {
            console.log(`\n========== ${label} ==========`);
            console.log(`HTTP ${status}  content-type: ${ct}`);
          }
          async function getJSON(url, opts = {}) {
            const r = await fetch(url, { headers: { accept: 'application/json' }, signal: AbortSignal.timeout(20000), ...opts });
            const ct = r.headers.get('content-type') || '';
            let body = null, text = '';
            if (ct.includes('json')) { body = await r.json(); } else { text = await r.text(); }
            return { status: r.status, ct, body, text };
          }
          const present = (obj, fields) => fields.map(f => `${f}:${obj && obj[f] !== undefined ? 'YES' : 'no'}`).join('  ');
          const sample = (v) => JSON.stringify(v, null, 2).slice(0, 900);

          // ---- Resolve a public test wallet from the leaderboard ----
          let proxyWallet, traderName;
          try {
            const lb = await getJSON(LEADERBOARD);
            const t = (lb.body?.traders || [])[0];
            proxyWallet = t?.walletAddress;
            traderName = t?.displayName;
            console.log(`Test wallet: ${traderName} -> ${proxyWallet} (rank #${t?.rank})`);
          } catch (e) {
            console.log('FATAL: could not fetch leaderboard for a test wallet:', e.message);
            process.exit(1);
          }
          if (!proxyWallet) { console.log('FATAL: no walletAddress on leaderboard[0]'); process.exit(1); }

          // 1) data-api /activity
          try {
            const r = await getJSON(`https://data-api.polymarket.com/activity?user=${proxyWallet}&limit=3`);
            head('1. data-api /activity', r.status, r.ct);
            const first = Array.isArray(r.body) ? r.body[0] : (r.body?.[0] ?? r.body);
            console.log('documented fields ->', present(first, ['timestamp','type','side','size','usdcSize','price','conditionId','asset','outcome','proxyWallet']));
            console.log('SAMPLE:\n' + sample(first));
          } catch (e) { console.log('1. data-api /activity -> ERR', e.message); }

          // 2) data-api /value
          try {
            const r = await getJSON(`https://data-api.polymarket.com/value?user=${proxyWallet}`);
            head('2. data-api /value', r.status, r.ct);
            const first = Array.isArray(r.body) ? r.body[0] : r.body;
            console.log('documented fields ->', present(first, ['user','value']));
            console.log('SAMPLE:\n' + sample(r.body));
          } catch (e) { console.log('2. data-api /value -> ERR', e.message); }

          // 3) gamma /public-profile  (try ?address= then ?proxyWallet=)
          for (const param of ['address', 'proxyWallet', 'user']) {
            try {
              const r = await getJSON(`https://gamma-api.polymarket.com/public-profile?${param}=${proxyWallet}`);
              head(`3. gamma /public-profile?${param}=`, r.status, r.ct);
              if (r.status === 200) {
                console.log('documented fields ->', present(r.body, ['xUsername','verifiedBadge','name','pseudonym','proxyWallet','bio']));
                console.log('SAMPLE:\n' + sample(r.body));
                break;
              } else {
                console.log('non-200; trying next param. body:', sample(r.body ?? r.text));
              }
            } catch (e) { console.log(`3. gamma /public-profile?${param}= -> ERR`, e.message); }
          }

          // 4) clob /rewards/markets/current
          try {
            const r = await getJSON('https://clob.polymarket.com/rewards/markets/current');
            head('4. clob /rewards/markets/current', r.status, r.ct);
            const arr = r.body?.data || r.body?.markets || (Array.isArray(r.body) ? r.body : null);
            const first = arr ? arr[0] : r.body;
            console.log('count:', Array.isArray(arr) ? arr.length : 'n/a');
            console.log('documented fields ->', present(first, ['condition_id','total_daily_rate','rewards_max_spread','rewards_min_size','start_date','end_date']));
            console.log('SAMPLE:\n' + sample(first));
          } catch (e) { console.log('4. clob /rewards/markets/current -> ERR', e.message); }

          // 5) gamma /tags
          try {
            const r = await getJSON('https://gamma-api.polymarket.com/tags?limit=8');
            head('5. gamma /tags', r.status, r.ct);
            const arr = Array.isArray(r.body) ? r.body : (r.body?.data || null);
            console.log('count:', Array.isArray(arr) ? arr.length : 'n/a');
            console.log('SAMPLE (first 5):\n' + sample(Array.isArray(arr) ? arr.slice(0, 5) : r.body));
          } catch (e) { console.log('5. gamma /tags -> ERR', e.message); }

          console.log('\n========== DONE ==========');
          EOF