name: Daily Blog Agent

on:
  schedule:
    # Primary tick at 09:17 UTC daily. Off-the-hour minutes are much less
    # likely to be skipped by GitHub Actions than the popular :00 slot,
    # which is heavily oversubscribed and frequently dropped under load.
    - cron: '17 9 * * *'
    # Fallback tick at 14:42 UTC, ~5.5h later. The agent is idempotent
    # within a calendar day — if the primary tick already published, the
    # fallback exits cleanly without generating a duplicate. If the
    # primary was skipped, the fallback catches up.
    - cron: '42 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 || \
          sudo apt-get install -y \
            libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Run daily blog agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/daily-blog-agent.js
